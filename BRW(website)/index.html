<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRW | Board Riders of Winter</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #f0f0f0;
            --accent: #ffffff;
            --muted: #555;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-transform: uppercase;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Subtle luxury grain texture */
        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.05;
            pointer-events: none;
            z-index: 10;
        }

        /* --- NEW WHITE BANNER STYLING --- */


        header {
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo-container {
            display: flex;
            align-items: center;
        }

        .logo-img {
            height: 40px; 
            width: auto;
            /* Filter removed here so the black logo shows on white */
            display: block;
        }

        .location-tag {
            font-size: 0.7rem;
            color: #000; /* Changed to black for the white banner */
            letter-spacing: 3px;
            text-align: right;
            line-height: 1.5;
            font-weight: 500;
        }
        /* --- END OF NEW STYLING --- */

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            z-index: 20;
        }

        .status-bar {
            font-size: 0.8rem;
            letter-spacing: 10px;
            color: var(--muted);
            margin-bottom: 20px;
            font-weight: 300;
        }

        .hype-title {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(2.5rem, 15vw, 9rem);
            line-height: 0.8;
            margin-bottom: 15px;
            letter-spacing: -4px;
        }

        .brand-sub {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(1rem, 4vw, 2.2rem);
            letter-spacing: 18px;
            margin-bottom: 80px;
            color: var(--text);
            opacity: 0.9;
        }

        .social-cta {
            margin-top: 20px;
        }

        .insta-link {
            text-decoration: none;
            color: var(--accent);
            font-size: 0.7rem;
            letter-spacing: 6px;
            display: inline-flex;
            align-items: center;
            gap: 25px;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 12px 24px;
        }

        .insta-link:hover {
            letter-spacing: 9px;
            opacity: 0.7;
        }

        .insta-link span {
            width: 50px;
            height: 1px;
            background: var(--accent);
            transition: width 0.5s ease;
        }

        .insta-link:hover span {
            width: 80px;
        }

        footer {
            padding: 40px;
            display: flex;
            justify-content: space-between;
            font-size: 0.6rem;
            color: var(--muted);
            letter-spacing: 3px;
            z-index: 20;
        }

        @media (max-width: 768px) {
            header, footer { padding: 30px 20px; }
            .location-tag { display: none; }
            .brand-sub { letter-spacing: 10px; margin-bottom: 50px; }
            .insta-link span { width: 30px; }
        }
    </style>
</head>
<body>

    <div class="noise"></div>

    <div class="header-banner">
        <header>
            <div class="logo-container">
                <img src="pictures/logo.png" alt="BRW" class="logo-img">
            </div>
            <div class="location-tag">
                CPT / SOUTH AFRICA<br>COLLECTION 01 / 2026
            </div>
        </header>
    </div>

    <main>
        <div class="status-bar">SYSTEM STATUS: IMMINENT</div>
        
        <h1 class="hype-title">BOARD<br>RIDERS</h1>
        <div class="brand-sub">OF WINTER</div>

        <div class="social-cta">
            <a href="https://instagram.com/boardridersofwinter" target="_blank" class="insta-link">
                <span></span> FOLLOW THE DESCENT <span></span>
            </a>
        </div>
    </main>

    <footer>
        <div>© 2026 BRW STUDIO</div>
        <div>L'ÉLITE D'HIVER</div>
    </footer>

</body>
</html>
